services:
  - type: web
    name: portfolio
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeploy: true
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://portfolio-dmex.onrender.com
      - key: ASSET_URL
        value: https://portfolio-dmex.onrender.com
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_STACK
        value: single
      - key: SESSION_DRIVER
        value: cookie
      - key: SESSION_LIFETIME
        value: "120"
      - key: CACHE_STORE
        value: file
      - key: VIEW_COMPILED_PATH
        value: /tmp/views
      - key: QUEUE_CONNECTION
        value: sync
      - key: BROADCAST_CONNECTION
        value: log
      - key: FILESYSTEM_DISK
        value: local
      - key: MAIL_MAILER
        value: log
      - key: TRUST_PROXIES
        value: "*"
      - key: PORT
        value: "10000"
      # Uncomment + set DATABASE_URL from your Render Postgres to use a real DB
      # - key: DB_CONNECTION
      #   value: pgsql
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: portfolio-db
      #     property: connectionString

  # Optional free Postgres (uncomment to enable)
  # - type: pserv
  #   name: portfolio-db
  #   plan: free
  #   databaseName: portfolio
  #   user: portfolio
